services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: decisioning
      POSTGRES_USER: decisioning
      POSTGRES_PASSWORD: decisioning
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decisioning"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-api:
    image: wiremock/wiremock:3.13.2
    command: ["--global-response-templating"]
    ports:
      - "8081:8080"
    volumes:
      - ./mock-api/mappings:/home/wiremock/mappings

  db-migration:
    image: liquibase/liquibase:5.0.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src/main/resources/db/changelog:/liquibase/changelog
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://postgres:5432/decisioning
      LIQUIBASE_COMMAND_USERNAME: decisioning
      LIQUIBASE_COMMAND_PASSWORD: decisioning
      LIQUIBASE_COMMAND_CHANGELOG_FILE: /liquibase/changelog/db.changelog-master.yaml

  backend:
    image: eclipse-temurin:21-jre-alpine-3.23
    ports:
      - "8082:8080"
    depends_on:
      db-migration:
        condition: service_completed_successfully
      mock-api:
        condition: service_started
    volumes:
      - ./backend/target/decisioning-0.0.1-SNAPSHOT.jar:/app/app.jar
    command:
      - "java"
      - "-jar"
      - "/app/app.jar"
      - "--spring.datasource.url=jdbc:postgresql://postgres:5432/decisioning?currentSchema=public"
      - "--spring.datasource.username=decisioning"
      - "--spring.datasource.password=decisioning"

  frontend:
    image: nginx:1.31-alpine
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
